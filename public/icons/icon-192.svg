<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background -->
  <rect width="192" height="192" rx="36" fill="#0D0D0F"/>

  <!-- Outer gold ring -->
  <circle cx="96" cy="82" r="52" fill="none" stroke="#C9A55C" stroke-width="1" opacity="0.4"/>

  <!-- Inner gold ring -->
  <circle cx="96" cy="82" r="41" fill="none" stroke="#C9A55C" stroke-width="0.5" opacity="0.25"/>

  <!-- Glass orb -->
  <circle cx="96" cy="82" r="34" fill="url(#orbGradient192)"/>

  <!-- Korean character 유 -->
  <text x="96" y="97" font-family="Georgia, serif" font-size="30" font-weight="700" text-anchor="middle" fill="#E8C97A">유</text>

  <!-- Wordmark -->
  <text x="96" y="142" font-family="Georgia, serif" font-size="13" font-weight="600" text-anchor="middle" fill="#C9A55C" letter-spacing="1">SEOUL</text>
  <text x="96" y="157" font-family="Georgia, serif" font-size="8" font-weight="400" text-anchor="middle" fill="#8B7340" letter-spacing="3">SISTER</text>

  <!-- Gold accent lines -->
  <line x1="55" y1="148" x2="73" y2="148" stroke="#C9A55C" stroke-width="0.5" opacity="0.5"/>
  <line x1="119" y1="148" x2="137" y2="148" stroke="#C9A55C" stroke-width="0.5" opacity="0.5"/>

  <defs>
    <radialGradient id="orbGradient192" cx="38%" cy="34%" r="66%">
      <stop offset="0%" stop-color="#3D2E14"/>
      <stop offset="55%" stop-color="#241A0A"/>
      <stop offset="100%" stop-color="#131008"/>
    </radialGradient>
  </defs>
</svg>
